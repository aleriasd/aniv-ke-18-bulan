<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('Background.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .foto-interaktif {
            width: 350px;
            max-width: 80vw;
            transition: all 0.3s ease-in-out; 
            cursor: pointer;
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.3));
        }

        .foto-interaktif:hover {
            filter: drop-shadow(0px 0px 25px rgba(255, 255, 255, 1)); 
            transform: scale(1.05); 
        }

        .pesan-kecil {
            color: #ffffff;
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* --- STYLING MODAL DENGAN SLIDER --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 85%;
            overflow: hidden; /* Penting untuk menyembunyikan slide lain */
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* Wadah geser untuk slide */
        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 200%; /* Karena ada 2 slide */
        }

        .slide {
            width: 50%;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            flex-shrink: 0;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Font Sambung (Dancing Script) */
        .kursif {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #333;
            margin-bottom: 15px;
        }

        /* Font Times New Roman */
        .isi-pesan {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.25rem;
            color: #444;
            line-height: 1.6;
        }

        /* Styling Foto Kenangan di Slide 2 */
        .foto-kenangan {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Tombol Navigasi */
        .nav-btn {
            background: #a6c1ee;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #8da9d6; }

        .btn-tutup-top {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Anniversary, Kinawww🤍!</h1>
        
        <img 
            src="Datar.png" 
            alt="Foto Kita" 
            class="foto-interaktif"
            onmouseover="this.src='Senyum.png'"
            onmouseout="this.src='Datar.png'"
            onclick="bukaPesan()"
        >
        
        <p class="pesan-kecil">Klik fotonya untuk melihat kejutan...</p>
    </div>

    <div class="modal-overlay" id="overlay">
        <div class="modal-box">
            <button class="btn-tutup-top" onclick="tutupPesan()">×</button>
            
            <div class="slider-wrapper" id="slider">
                <div class="slide">
                    <h2 class="kursif">Dear Kina...</h2>
                    <p class="isi-pesan">
                        Terima kasih sudah menemani perjalananku sejauh ini. 
                        Kamu adalah alasan kenapa setiap hari terasa lebih berwarna. 
                        Semoga kita tetap seperti ini selamanya.
                    </p>
                    <button class="nav-btn" onclick="keSlide(1)">Selanjutnya ➔</button>
                </div>

                <div class="slide">
                    <img src="First.jpg" alt="Awal Pacaran" class="foto-kenangan">
                    <h2 class="kursif">7 November 2024</h2>
                    <p class="isi-pesan" style="font-style: italic;">Di mana semuanya dimulai...</p>
                    <div style="margin-top: 10px;">
                        <button class="nav-btn" onclick="keSlide(0)">⬅ Kembali</button>
                        <button class="nav-btn" style="background:#fbc2eb" onclick="tutupPesan()">Selesai 🤍</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bukaPesan() {
            document.getElementById('overlay').style.display = 'flex';
            keSlide(0); // Selalu mulai dari slide 1 saat dibuka
        }

        function tutupPesan() {
            document.getElementById('overlay').style.display = 'none';
        }

        function keSlide(index) {
            const slider = document.getElementById('slider');
            slider.style.transform = `translateX(-${index * 50}%)`;
        }

        // Tutup modal jika klik di area luar kotak putih
        window.onclick = function(event) {
            const overlay = document.getElementById('overlay');
            if (event.target == overlay) {
                tutupPesan();
            }
        }
    </script>

</body>
</html>
